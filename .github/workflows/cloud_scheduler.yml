name: Cloud Scheduler CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  build-and-run:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y g++ gcc python3 python3-pip

      - name: Install Python Libraries
        run: |
          pip3 install pandas matplotlib seaborn

      - name: Create Required Directories
        run: |
          mkdir -p builds
          mkdir -p outputs/logs
          mkdir -p outputs/metrics
          mkdir -p outputs/visualizations

      - name: Compile Input Generator
        run: |
          gcc input_generator.c -o builds/gen

      - name: Generate Workload
        run: |
          ./builds/gen

      - name: Compile Scheduler
        run: |
          g++ -std=c++17 main.cpp -o builds/run

      - name: Execute Scheduler
        run: |
          ./builds/run

      - name: Generate Charts
        run: |
          python3 charts.py

      - name: Upload Metrics
        uses: actions/upload-artifact@v4
        with:
          name: scheduler-metrics
          path: outputs/metrics/

      - name: Upload Visualizations
        uses: actions/upload-artifact@v4
        with:
          name: scheduler-visualizations
          path: outputs/visualizations/